services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - db_data:/data
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
